<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIS2 Ledelsessimulation – DataBridge Solutions A/S</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat','Lucida Sans',system-ui,sans-serif;background:#F3F4F7;color:#2C3E44;min-height:100vh}

/* ── Topbar ── */
.topbar{background:#fff;border-bottom:3px solid #80B4BF;padding:.65rem 1.5rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.topbar-logo{height:28px;display:block}
.topbar-right{display:flex;align-items:center;gap:.65rem}
.topbar-divider{font-size:11px;font-weight:600;color:#808B94;text-transform:uppercase;letter-spacing:.05em;border-left:1px solid #BED4DB;padding-left:.65rem}
.topbar-link{font-size:11px;font-weight:600;color:#3A646D;text-decoration:none}
.topbar-link:hover{color:#2C4F57}

/* ── Layout ── */
.outer{max-width:720px;margin:0 auto;padding:1.5rem 1rem 3rem}

/* ── Tags/badges ── */
.tag{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:3px 9px;border-radius:4px;border:1px solid}
.tag-teal{background:#EBF4F6;color:#3A646D;border-color:#80B4BF}
.tag-law{background:#BED4DB;color:#3A646D;border-color:#80B4BF}
.tag-isms{background:#F4EBC0;color:#5A4A10;border-color:#C8B86A}
.tag-default{background:#fff;color:#808B94;border-color:#BED4DB}

/* ── Cards ── */
.card{background:#fff;border:1px solid #BED4DB;border-top:3px solid #80B4BF;border-radius:4px;padding:1.1rem 1.2rem;margin-bottom:.85rem;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-plain{background:#fff;border:1px solid #BED4DB;border-radius:4px;padding:.9rem 1rem;margin-bottom:.65rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}

/* ── Typografi ── */
h1{font-size:24px;font-weight:700;line-height:1.2;margin-bottom:.4rem;color:#2C3E44}
.subh{font-size:14px;color:#5A6A70;line-height:1.6;margin-bottom:1.25rem}
.section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#808B94;margin:.75rem 0 .4rem}

/* ── Faktabox ── */
.facts-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-bottom:.9rem}
.fact{background:#F3F4F7;border-left:3px solid #80B4BF;border-radius:0 4px 4px 0;padding:.5rem .65rem}
.fact-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#808B94;margin-bottom:.15rem}
.fact-value{font-size:13px;font-weight:700;color:#2C3E44}
.fact-sub{font-size:11px;color:#808B94;margin-top:.1rem}

/* ── Roller ── */
.roles{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.9rem}
.role-chip{background:#F3F4F7;border:1px solid #BED4DB;border-radius:4px;padding:.38rem .65rem;font-size:12px}
.role-name{font-weight:600;color:#2C3E44}
.role-title{color:#808B94;font-size:11px}

/* ── Meta-grid ── */
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:1rem}
.meta-item{background:#F3F4F7;border:1px solid #BED4DB;border-radius:4px;padding:.55rem .75rem;font-size:12px;line-height:1.45;color:#2C3E44}
.meta-item strong{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#808B94;margin-bottom:.1rem}

/* ── Knapper ── */
.btn-primary{display:block;width:100%;padding:.9rem;background:#3A646D;color:#fff;border:none;border-radius:4px;font-size:15px;font-weight:700;cursor:pointer;text-align:center;font-family:inherit;transition:background .15s}
.btn-primary:hover{background:#2C4F57}
.btn-secondary{display:block;width:100%;padding:.72rem;background:#fff;border:2px solid #3A646D;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer;color:#3A646D;font-family:inherit;transition:background .15s;margin-top:.5rem}
.btn-secondary:hover{background:#EBF4F6}
.btn-ghost{display:block;width:100%;padding:.72rem;background:#fff;border:1px solid #BED4DB;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;color:#3A646D;font-family:inherit;transition:background .15s;margin-top:.5rem}
.btn-ghost:hover{background:#F3F4F7}

/* ── Progressbar ── */
.prog-wrap{margin-bottom:1rem}
.prog-label{font-size:11px;font-weight:600;color:#808B94;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.3rem}
.prog-track{height:4px;background:#BED4DB;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#3A646D;border-radius:2px;transition:width .5s ease}

/* ── Indikatorer ── */
.ind-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:5px;margin-bottom:1rem}
.ind{background:#F3F4F7;border:1px solid #BED4DB;border-radius:4px;padding:.55rem .35rem;text-align:center}
.ind-label{font-size:9px;color:#808B94;margin-bottom:.2rem;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.ind-val{font-size:19px;font-weight:700;color:#2C3E44}
.ind-val.pos{color:#3A646D}.ind-val.neg{color:#A32D2D}
.ind.econ{background:#F4EBC0;border-color:#C8B86A}
.ind.econ .ind-label{color:#7A6A20}
.ind.econ .ind-val{font-size:12px;color:#7A6A20}

/* ── Scenarie-kort ── */
.badges{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.65rem}
.module-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#808B94;margin-bottom:.2rem}
.situation{font-size:13.5px;line-height:1.7;margin-bottom:.9rem;padding-bottom:.9rem;border-bottom:1px solid #BED4DB;color:#2C3E44}
.situation strong{font-weight:600}
.situation em{font-style:italic;color:#5A6A70}
.choices-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#808B94;margin-bottom:.55rem}

/* ── Svarmuligheder ── */
.choice{display:block;width:100%;text-align:left;background:#fff;border:1px solid #BED4DB;border-radius:4px;padding:.75rem .9rem;margin-bottom:.4rem;cursor:pointer;font-size:13px;line-height:1.55;color:#2C3E44;font-family:inherit;transition:all .15s}
.choice:hover:not(:disabled){border-color:#3A646D;background:#EBF4F6}
.choice:disabled{cursor:default}
.choice.good-sel{border:2px solid #3A646D!important;background:#EBF4F6!important;color:#2C4F57!important}
.choice.bad-sel{border:2px solid #A32D2D!important;background:#FCEBEB!important;color:#501313!important}
.choice.neutral-sel{border:2px solid #C8B86A!important;background:#F4EBC0!important;color:#5A4A10!important}
.choice.dimmed{opacity:.4}

/* ── Delta-chips ── */
.delta-row{display:flex;flex-wrap:wrap;gap:.22rem;margin-top:.3rem}
.delta{display:inline-block;padding:2px 6px;border-radius:3px;font-size:11px;font-weight:600}
.delta.pos{background:#EBF4F6;color:#3A646D}
.delta.neg{background:#FCEBEB;color:#A32D2D}
.delta.neu{background:#F3F4F7;color:#808B94}

/* ── Konsekvens-bokse ── */
.consequence{font-size:12.5px;color:#5A6A70;background:#F3F4F7;border:1px solid #BED4DB;border-radius:4px;padding:.6rem .8rem;margin-top:.45rem;line-height:1.65}
.econ-box{font-size:12.5px;background:#F4EBC0;border:1px solid #C8B86A;border-radius:4px;padding:.6rem .8rem;margin-top:.35rem;line-height:1.65;color:#5A4A10}
.econ-box strong{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#7A6A20;margin-bottom:.1rem}
.legal-chips{margin-top:.4rem;display:flex;flex-wrap:wrap;gap:.22rem}
.legal-chip{display:inline-block;font-size:10px;font-weight:600;background:#FCEBEB;color:#A32D2D;border-radius:3px;padding:2px 6px}
.insight-box{font-size:12.5px;border-left:3px solid #80B4BF;padding:.5rem .85rem;color:#3A646D;background:#EBF4F6;border-radius:0 4px 4px 0;margin-top:.8rem;line-height:1.65}
.insight-box strong{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#808B94;margin-bottom:.1rem}

/* ── Rapport ── */
.score-box{text-align:center;padding:.85rem;background:#fff;border:1px solid #BED4DB;border-top:3px solid #80B4BF;border-radius:4px;margin-bottom:.9rem;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.score-num{font-size:42px;font-weight:700;color:#3A646D;line-height:1}
.score-sub{font-size:12px;color:#808B94;margin-top:.25rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.profile-box{border-radius:4px;padding:1rem;margin-bottom:.75rem;border-left:4px solid;border:1px solid}
.profile-robust{background:#EBF4F6;border-color:#80B4BF;border-left-color:#3A646D;color:#2C4F57}
.profile-driftsfokus{background:#F4EBC0;border-color:#C8B86A;border-left-color:#C8B86A;color:#5A4A10}
.profile-reaktiv{background:#FAECE7;border-color:#F0997B;border-left-color:#F0997B;color:#4A1B0C}
.profile-sarbar{background:#FCEBEB;border-color:#F09595;border-left-color:#A32D2D;color:#501313}
.profile-title{font-size:18px;font-weight:700;margin-bottom:.3rem}
.profile-desc{font-size:13px;line-height:1.65}
.list-item{display:flex;align-items:flex-start;gap:.5rem;padding:.42rem 0;border-bottom:1px solid #BED4DB;font-size:13px;line-height:1.55;color:#2C3E44}
.list-item:last-child{border-bottom:none}
.dot-red{width:7px;height:7px;border-radius:50%;background:#A32D2D;flex-shrink:0;margin-top:4px}
.dot-green{width:7px;height:7px;border-radius:50%;background:#3A646D;flex-shrink:0;margin-top:4px}
.econ-table{background:#F4EBC0;border:1px solid #C8B86A;border-radius:4px;padding:.9rem 1rem;margin-bottom:.75rem}
.econ-row{display:flex;justify-content:space-between;font-size:12.5px;padding:.28rem 0;border-bottom:1px solid #C8B86A;color:#5A4A10}
.econ-row:last-child{border-bottom:none;font-weight:700;padding-top:.45rem}
.warn-box{background:#FCEBEB;border:1px solid #F09595;border-radius:4px;padding:.75rem .9rem;margin-bottom:.75rem;font-size:13px;color:#501313;line-height:1.65}

/* ── CTA ── */
.cta-box{background:#3A646D;border-top:4px solid #80B4BF;border-radius:4px;padding:1.25rem;text-align:center;margin-top:.85rem;position:relative;overflow:hidden}
.cta-box p{font-size:13.5px;line-height:1.65;color:rgba(255,255,255,.85);margin-bottom:.85rem}
.cta-btn{display:inline-block;padding:.65rem 1.5rem;background:#fff;border-radius:4px;font-size:13px;font-weight:700;color:#3A646D;text-decoration:none;transition:background .15s}
.cta-btn:hover{background:#EBF4F6}

/* ── Kulisse (prikkecirkel) ── */
.kulisse{position:absolute;pointer-events:none;opacity:.2}

/* ── Links-sektion ── */
.link-item{display:flex;align-items:center;gap:.6rem;background:#F3F4F7;border:1px solid #BED4DB;border-radius:4px;padding:.65rem .85rem;text-decoration:none;color:#2C3E44;transition:all .15s;margin-bottom:.55rem}
.link-item:hover{background:#EBF4F6;border-color:#80B4BF}
.link-abbr{width:32px;height:32px;border-radius:4px;border:1px solid;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.link-title{font-weight:600;font-size:13px}
.link-sub{font-size:11px;color:#808B94;margin-top:.1rem}

/* ── Footer ── */
.footer{text-align:center;margin-top:1.25rem;padding-top:1rem;border-top:1px solid #BED4DB}
.footer a{font-size:12px;color:#808B94;text-decoration:none;font-weight:600}
.footer a:hover{color:#3A646D}
.footer strong{color:#3A646D;font-weight:700}

/* ── RESPONSIVT ───────────────────────────────────────────────────────── */

/* Tablet (iPad) */
@media(max-width:768px){
  .outer{padding:1rem .75rem 2.5rem}
  h1{font-size:20px}
  .subh{font-size:13px}
  .facts-grid{grid-template-columns:1fr 1fr}
  .meta-grid{grid-template-columns:1fr}
  .ind-grid{gap:4px}
  .ind-val{font-size:16px}
  .ind.econ .ind-val{font-size:11px}
  .situation{font-size:13px}
  .choice{font-size:13px;padding:.7rem .85rem}
  .score-num{font-size:36px}
}

/* Mobil (iPhone) */
@media(max-width:480px){
  .outer{padding:.75rem .65rem 2rem}
  h1{font-size:18px}
  .subh{font-size:12.5px}
  .topbar{padding:.55rem .85rem}

  /* Faktabokse: 2 kolonner */
  .facts-grid{grid-template-columns:1fr 1fr;gap:5px}
  .fact{padding:.45rem .55rem}
  .fact-value{font-size:12px}
  .fact-sub{font-size:10px}

  /* Roller: fuld bredde */
  .roles{gap:.3rem}
  .role-chip{width:100%}

  /* Meta: enkelt kolonne */
  .meta-grid{grid-template-columns:1fr;gap:5px}

  /* Indikatorer: 5 i én række – komprimerede */
  .ind-grid{gap:3px}
  .ind{padding:.45rem .25rem}
  .ind-label{font-size:8px}
  .ind-val{font-size:15px}
  .ind.econ .ind-val{font-size:10px}

  /* Progressbar */
  .prog-label{font-size:10px}

  /* Situation-tekst */
  .situation{font-size:12.5px}

  /* Svar-knapper: større touch-target */
  .choice{font-size:13px;padding:.8rem .9rem;line-height:1.5}

  /* Knapper */
  .btn-primary{font-size:14px;padding:.85rem}
  .btn-secondary{font-size:13px}
  .btn-ghost{font-size:13px}

  /* Score */
  .score-num{font-size:34px}
  .score-sub{font-size:11px}

  /* Rapport liste-items */
  .list-item{font-size:12.5px}

  /* CTA */
  .cta-box p{font-size:12.5px}
  .cta-btn{font-size:12px;padding:.55rem 1.1rem}

  /* Links */
  .link-title{font-size:12px}
  .link-sub{font-size:10px}
}

/* Timer */
.timer-ring-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:.65rem}
.timer-ring-svg{transform:rotate(-90deg)}
.timer-ring-bg{fill:none;stroke:#BED4DB;stroke-width:4}
.timer-ring-fill{fill:none;stroke-width:4;stroke-linecap:round;
                 transition:stroke-dashoffset .9s linear, stroke .5s}
.timer-center{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;
              text-anchor:middle;dominant-baseline:central;font-family:'Montserrat',sans-serif}
.timer-label-txt{font-size:7px;text-anchor:middle;font-family:'Montserrat',sans-serif;
                 fill:#808B94;text-transform:uppercase;letter-spacing:.05em}
</style>
</head>

    lawRef:"§ 7 – Ledelsesansvar",ismsRef:null,
    situation:`<strong>Hændelsen starter.</strong> Klokken er 08.12. Tre medarbejdere kontakter IT-support: de kan ikke logge på. Økonomisystemet svarer langsomt, og en controller kan ikke åbne budgetfiler fra delte drev.<br><br>TechOps ApS, som håndterer hele serverinfrastrukturen, skriver: <em>"Vi er opmærksomme på en mulig fejl og undersøger sagen."</em><br><br>Mette Sørensen (CEO) modtager beskeden. CISO-funktionen er outsourcet. Der er ingen intern beredskabsplan. Forsikringen dækker driftstab, men kræver dokumentation for ledelsesinitiativ fra første øjeblik.`,

    lawRef:"§ 6 stk. 1 nr. 1 – Risikostyring",ismsRef:"Informationsaktiver · Risikotolerance",
    situation:`<strong>Hvad ved vi egentlig om vores egne systemer?</strong> Mens krisen eskalerer, stiller Anders Møller (juridisk rådgiver) (juridisk rådgiver) et afgørende spørgsmål: <em>"Har DataBridge en opdateret risikovurdering? Og ved vi præcist, hvilke systemer og data der er kritiske?"</em><br><br>En hurtig samtale med Line Kristensen (Head of Operations) afslører et alvorligt hul: DataBridge har ingen fortegnelse over informationsaktiver. Ingen ved præcist, hvilke systemer der er forretningskritiske, hvilke data der er klassificeret som følsomme, eller hvilken risikotærskel bestyrelsen har godkendt.<br><br>Det betyder, at DataBridge ikke kan prioritere genoprettelsen rationelt – og ikke kan svare myndighederne præcist om, hvad der er kompromitteret.`,
    insight:"§ 6 stk. 1 nr. 1 kræver politikker for risikoanalyse og informationssikkerhed. § 7 kræver, at ledelsesorganet tager stilling til risikovillighed. Uden en fortegnelse over informationsaktiver kan DataBridge hverken prioritere gendannelsen eller svare myndighederne korrekt.",
    choices:[
      {text:"Vi gendanner alle systemer parallelt og på én gang uden intern prioritering. Vi har ikke tid til at sidde og sortere nu – TechOps kender infrastrukturen og ved godt, hvad der skal op at køre hurtigst muligt. Vi informerer TechOps om beslutningen.",shortText:"Gendannelse af alle systemer parallelt – ingen prioritering",d:0,c:2,o:1,l:2,quality:"good",consequence:"En dokumenteret aktivoversigt giver prioriteringsgrundlag for gendannelsen og konkret input til myndighederne om scopet. Viser god tro og ledelsesmæssig handleevne.",econ:"Korrekt prioritering reducerer nedetid markant. Myndighederne vurderer dokumentation positivt.",econ_impact:0,legal:[],markers:["risikovurdering"]},
      {text:"Jakob kortlægger de systemer der er kritiske for fakturering og kundeleverancer. Line lister de vigtigste datatyper og deres klassifikation. Det dokumenteres i loggen som vores midlertidige aktivoversigt og bruges til at styre prioriteringen af gendannelsen.",shortText:"Aktivoversigt udarbejdet og dokumenteret i beslutningsloggen",d:1,c:-2,o:-1,l:-2,quality:"bad",consequence:"Uden prioritering risikerer DataBridge at bruge ressourcer på sekundære systemer, mens kritiske kundesystemer venter. Myndighederne kan ikke få svar på, hvad der er kompromitteret. TechOps kender ikke DataBridges forretningskritiske prioriteringer.",econ:"Ukritisk gendannelse: estimeret 30–40% længere nedetid. Manglende aktivoversigt er en selvstændig NIS2-mangel.",econ_impact:120000,legal:["NIS2 § 6 stk. 1 nr. 1 – ingen politikker for risikoanalyse","NIS2 § 7 – ledelsen har aldrig taget stilling til risikovillighed"]},
      {text:"Vi bruger 10–15 minutter på en hurtig mundtlig diskussion i ledergruppen om, hvad der er vigtigst at genoprette, og giver TechOps en verbal prioriteringsliste. Vi dokumenterer det ikke skriftligt, da der ikke er tid til det nu midt i krisen.",shortText:"Mundtlig prioritering aftalt – ikke dokumenteret skriftligt",d:0,c:1,o:0,l:1,quality:"neutral",consequence:"En mundtlig prioritering er bedre end ingen, men uden dokumentation kan DataBridge ikke bevise over for myndighederne, at ledelsen tog stilling til risikovillighed og aktivklassificering som § 7 kræver.",econ:"Mundtlig prioritering reducerer noget risiko, men manglende dokumentation giver ikke myndighederne det svar de kræver.",econ_impact:40000,legal:[]}
    ]
  },
  {
    time:"Mandag kl. 08.30",title:"Runde 3",module:"Fase 1 – Opdagelse og første respons",
    lawRef:"§ 10 – Registreringspligt",ismsRef:"Complianceoverblik",
    situation:`<strong>Et ubehageligt spørgsmål rejser sig.</strong> Anders Møller (juridisk rådgiver) stiller endnu et spørgsmål: <em>"Er DataBridge egentlig registreret som NIS2-enhed på virk.dk?"</em><br><br>Et hurtigt tjek afslører: DataBridge beskæftiger 52 ansatte og leverer informations- og kommunikationstjenester – oplistet i NIS2 bilag 2. Virksomheden er en <strong>vigtig enhed</strong> efter § 5.<br><br>NIS2-loven trådte i kraft 1. januar 2024. § 10 kræver dog først registrering på virk.dk senest 1. oktober 2025. Det er nu midt i august 2025 – DataBridge er ikke registreret endnu, men fristen er ikke overskredet. Alligevel er det klogt at handle nu, da hændelsen under alle omstændigheder kræver underretning via samme platform.`,
    insight:"Det er enhedens eget ansvar at vurdere om den er NIS2-omfattet og registrere sig inden 1. oktober 2025. Selvom fristen endnu ikke er overskredet, er det klogt at registrere sig nu – hændelsen kræver under alle omstændigheder kontakt til myndighederne via virk.dk.",
    choices:[
      {text:"Vi venter med registreringen til hændelsen er overstået og vi har ro til det. Vi har mere end nok at se til i dag, og en registrering kan hverken afhjælpe angrebet eller forandre den juridiske situation her og nu.",shortText:"Registrering på virk.dk udsat til efter hændelsen",d:0,c:2,o:1,l:2,quality:"good",consequence:"Sen registrering er markant bedre end ingen registrering. Dokumentationen af tidspunktet og omstændighederne viser god tro og proaktiv adfærd, som tilsynsmyndighederne vægter positivt.",econ:"Proaktiv registrering kombineret med god-tro-dokumentation reducerer bøderisikoen markant.",econ_impact:0,legal:[],markers:[]},
      {text:"Vi registrerer os på virk.dk nu for at undgå yderligere forsinkelse, men oplyser ikke i registreringen at vi er midt i en aktiv hændelse. Det er to separate forhold, som vi vurderer bør håndteres uafhængigt af hinanden.",shortText:"Registreret på virk.dk – hændelse ikke oplyst til myndighed",d:1,c:-2,o:-1,l:-1,quality:"bad",consequence:"Fristen er endnu ikke overskredet, men en igangværende hændelse kræver under alle omstændigheder kontakt til myndighederne. At undlade at handle nu svækker DataBridges position, selvom registreringen formelt kan vente til 1. oktober 2025.",econ:"Fristen er ikke formelt overskredet, men passivitet under en igangværende hændelse svækker DataBridges position over for myndighederne.",econ_impact:250000,legal:["Manglende handling under igangværende hændelse – svækker DataBridges position"]},
      {text:"Vi registrerer os på virk.dk med det samme. Anders noterer tidspunktet og dokumenterer registreringen i beslutningsloggen som bevis for, at ledelsen handlede proaktivt da forholdet kom til kendskab.",shortText:"Registreret på virk.dk – dokumenteret i beslutningsloggen",d:0,c:-1,o:-1,l:-1,quality:"bad",consequence:"Registrering uden at oplyse om den igangværende hændelse kan opfattes som vildledning, da hændelsen kræver underretning via samme kanal (virk.dk). Myndighederne vil sandsynligvis opdage sammenhængen.",econ:"Risiko for skærpede sanktioner og tab af god-tro-argumentet ved manglende åbenhed over for tilsynsmyndigheden.",econ_impact:150000,legal:["Potentiel vildledning af tilsynsmyndighed ved tilbageholdelse af relevant information"]}
    ]
  },
  {
    time:"Mandag kl. 08.45",title:"Runde 4",module:"Fase 1 – Opdagelse og første respons",
    lawRef:"§ 6 stk. 2 – Pligt til at handle · § 7",ismsRef:null,
    situation:`<strong>Ransomware bekræftet.</strong> TechOps ringer: mistanke om ransomware er bekræftet. Seks delte drev er krypterede. Backup er angiveligt intakt, men TechOps kan ikke bekræfte hvornår seneste backup er fra, eller om den er ren.<br><br>Kundeserviceteamet melder om begyndende driftsforstyrrelser. En stor kunde har allerede skrevet til Line Kristensen (Head of Operations) og spurgt hvad der sker.<br><br>Mette samler Jakob Dahl (CFO) og Line Kristensen (Head of Operations) til krisemøde. Den aktivoversigt DataBridge udarbejdede i runde 2 viser sig nu brugbar: I ved hvilke systemer der skal genoprettes først.`,
    insight:"§ 6 stk. 2: enheden skal uden unødigt ophold træffe alle nødvendige, passende og forholdsmæssige korrigerende foranstaltninger. § 7: ledelsen godkender og overvåger – dette kan ikke outsources til TechOps.",
    choices:[
      {text:"Mette aktiverer internt kriseniveau: Jakob styrer økonomi og forsikring, Line styrer drift og kunder, Mette har overordnet ansvar og koordinerer med TechOps. Beslutningsloggen fortsættes og aktivoversigten bruges aktivt til at prioritere genoprettelsen.",shortText:"Internt kriseniveau aktiveret – roller fordelt, log fortsætter",d:1,c:-2,o:-1,l:-2,quality:"bad",consequence:"TechOps er under pres fra flere kunder simultant. Mette godkender og overvåger ikke foranstaltningerne som § 7 kræver. Ansvaret skubbes til leverandøren, men det juridiske ansvar forbliver hos DataBridges ledelse.",econ:"TechOps' backlog og manglende intern prioritering: estimeret ekstra driftstab 150.000–300.000 kr.",econ_impact:220000,legal:["NIS2 § 7 – godkendelses- og tilsynspligt kan ikke uddelegeres til TechOps","NIS2 § 6 stk. 2 – pligt til at handle uden unødigt ophold"]},
      {text:"Vi overlader det tekniske fuldt ud til TechOps og beder dem håndtere gendannelsen selvstændigt. Mette holder telefonen åben, modtager løbende statusopdateringer og viderebringer dem til Jakob og Line. Ledelsen blander sig ikke direkte i det tekniske.",shortText:"Gendannelse overladt fuldt til TechOps – ledelsen passiv",d:-1,c:2,o:1,l:2,quality:"good",consequence:"Krisestaben giver klart ansvarshierarki og dokumenterbar beslutningsproces. Aktivoversigten fra runde 2 giver et rationelt prioriteringsgrundlag. TechOps arbejder, men ledelsen styrer og overvåger.",econ:"Struktureret krisestab reducerer reaktionstid og giver forsikringsselskabet den dokumentation de kræver.",econ_impact:0,legal:[],markers:["beredskab"]},
      {text:"Vi lukker alle centrale systemer ned – også dem der stadig fungerer – for at forhindre yderligere spredning af ransomwaren. Vi vurderer det som det sikreste valg at isolere hele infrastrukturen, mens TechOps analyserer situationens fulde omfang.",shortText:"Alle systemer lukket ned for at stoppe spredning",d:-2,c:1,o:0,l:1,quality:"neutral",consequence:"Defensiv beslutning der reducerer risiko for lateral bevægelse. Men I lukker også systemer der fungerede og forlænger dermed nedetiden. Der er stadig ingen intern koordinationsstruktur eller beslutningslog.",econ:"Nedlukning af fungerende systemer: estimeret øget driftstab 80.000–120.000 kr. Synergieffekten med manglende ledelsesstruktur forværrer tabet yderligere.",econ_impact:100000,legal:[]}
    ]
  },
  {
    time:"Mandag kl. 09.20",title:"Runde 5",module:"Fase 3 – Leverandørkæden og forsyningssikkerhed",
    lawRef:"§ 6 stk. 1 nr. 4 – Forsyningskædesikkerhed",ismsRef:"Informationsaktiver · Scope",
    situation:`<strong>Underleverandøren er kilden.</strong> TechOps oplyser at deres cloud-hostingleverandør <strong>CloudHost GmbH</strong> er kompromitteret. Angrebet startede hos CloudHost og spredte sig til TechOps' kunder – herunder DataBridge.<br><br>DataBridge har ingen kontrakt med CloudHost og har aldrig stillet krav til deres sikkerhedsniveau. Kontrakten med TechOps indeholder ingen bestemmelser om ansvar ved fejl hos underleverandører.<br><br>Aktivoversigten fra runde 2 viser sig nu af direkte betydning: I kan præcist oplyse TechOps og myndighederne om, hvilke af DataBridges systemer der er eksponerede. Nøglekunden der udgør 22% af omsætningen kræver nu svar på om SLA-aftalen kan overholdes.`,
    insight:"NIS2 § 6 stk. 1 nr. 4: I er ansvarlige for at leverandørers og underleverandørers cybersikkerhed er tilstrækkelig. Kæden er ikke stærkere end det svageste led.",
    choices:[
      {text:"Vi afventer TechOps' næste opdatering og undlader at kontakte dem. De har lovet at vende tilbage hurtigst muligt, og vi ønsker ikke at forstyrre dem i et kritisk arbejdsøjeblik. DataBridge kan ikke tilføje teknisk værdi ved at presse på for hyppigere opdateringer.",shortText:"Afventer TechOps passivt – ingen aktiv leverandørstyring",d:0,c:-2,o:-1,l:-2,quality:"bad",consequence:"DataBridge mister kontrollen over en kritisk tredjepartsrisiko. Nøglekunden aktiverer sandsynligvis SLA-brud inden for timer. DataBridge har aldrig stillet sikkerhedskrav til CloudHost – en skærpende omstændighed ved tilsyn.",econ:"SLA-brud hos nøglekunde: estimeret tab op til 450.000 kr. ved kontraktophævelse eller rabatkrav.",econ_impact:450000,legal:["SLA-brud – kontraktretlig eksponering","NIS2 § 6 stk. 1 nr. 4 – manglende forsyningskædestyring","Ingen sikkerhedskrav stillet til CloudHost – skærpende omstændighed"]},
      {text:"Anders kontaktes straks for at vurdere SLA-ansvar og kontraktgrundlaget med TechOps. Vi kræver skriftlig eskalation fra TechOps hvert 30. minut og bruger aktivoversigten til at specificere præcist hvilke af DataBridges systemer og data TechOps skal prioritere.",shortText:"Anders aktiveret – skriftlig eskalation krævet af TechOps",d:0,c:2,o:1,l:2,quality:"good",consequence:"Aktiv leverandørstyring kombineret med aktivoversigten giver TechOps et præcist prioriteringsgrundlag. Anders vurderer SLA-ansvar og DataBridges kontraktmæssige muligheder. Nøglekunden oplever, at DataBridge er på sagen.",econ:"Aktiv leverandørstyring og juridisk afklaring reducerer SLA-eksponering markant og forebygger sandsynligvis kontraktophævelse.",econ_impact:0,legal:[],markers:["leverandor"]},
      {text:"Vi kontakter straks en alternativ IT-leverandør og igangsætter gendannelse af de vigtigste forretningskritiske systemer parallelt med TechOps' igangværende arbejde. Vi vurderer, at vi ikke kan tillade os at være fuldt afhængige af én leverandør i denne kritiske situation.",shortText:"Alternativ IT-leverandør kontaktet – parallel gendannelse",d:-1,c:0,o:0,l:1,quality:"neutral",consequence:"Handlekraft, men en ny leverandør uden kendskab til DataBridges infrastruktur kan skabe forvirring, konflikter og forsinke den samlede gendannelse. Dobbelt indsats kræver koordination, som ledelsen ikke har kapacitet til midt i krisen.",econ:"Dobbelt leverandørindsats: 30.000–80.000 kr. i konsulentomkostninger. Synergieffekt usikker og genoprettelsestiden kan blive længere.",econ_impact:55000,legal:[]}
    ]
  },
  {
    time:"Mandag kl. 10.00",title:"Runde 6",module:"Fase 4 – Underretningspligter og frister",
    lawRef:"§ 13 – Hændelsesunderretning · GDPR art. 33",ismsRef:"Complianceoverblik · Rapportering",
    situation:`<strong>Persondata kan være kompromitteret.</strong> TechOps oplyser at CloudHosts kompromittering sandsynligvis har givet adgang til kundekontrakter med CPR-numre fra 2021–2022. Omfanget er ukendt.<br><br>To parallelle frister løber nu:<br>– NIS2 § 13: tidlig varsling til myndighed og CSIRT senest <strong>24 timer</strong> efter kendskab (kl. 08.12)<br>– GDPR art. 33: underretning til Datatilsynet senest <strong>72 timer</strong> efter begrundet mistanke<br><br>Aktivoversigten fra runde 2 giver nu et konkret grundlag for underretningen: I ved hvilke systemer og datatyper der er eksponerede. Underretning sker via virk.dk.`,
    insight:"Lovgivningen kræver ikke fuld sikkerhed – kun begrundet mistanke. NIS2 og GDPR er separate forpligtelser – begge skal overholdes. Aktivoversigten er central dokumentation i underretningen.",
    choices:[
      {text:"Vi venter med enhver underretning til vi har et komplet og verificeret billede af hændelsens fulde omfang. Det ville være uansvarligt og uprofessionelt at underrette myndighederne på et ufuldstændigt grundlag og risikere fejlagtige oplysninger.",shortText:"Underretning til myndigheder udsat – afventer fuldt overblik",d:0,c:3,o:1,l:2,quality:"good",consequence:"Rettidig underretning med dokumenteret aktivgrundlag. Myndighederne vurderer proaktiv håndtering og veldokumenteret scope positivt. Aktivoversigten fra runde 2 viser sig nu at have afgørende praktisk værdi.",econ:"Rettidig underretning er den vigtigste enkeltfaktor for at undgå bøde. Estimeret bødebesparelse: 500.000–2.000.000 kr.",econ_impact:0,legal:[],markers:["dokumentation"]},
      {text:"Vi underretter Datatilsynet om det mulige GDPR-brud inden 72 timer men ser bort fra NIS2-underretningspligten. GDPR-forpligtelsen er den mest åbenlyse, og ét myndighedssvar vurderes at være tilstrækkeligt i denne akutte situation.",shortText:"Datatilsynet underrettet – NIS2-underretning undladt",d:1,c:-3,o:-1,l:-1,quality:"bad",consequence:"At vente på fuld klarhed er ikke juridisk acceptabelt. Lovgivningen kræver alene begrundet mistanke. DataBridge overskrider 24-timersfristen for NIS2 og risikerer at overskride GDPR's 72-timersfrist. Begge er selvstændige overtrædelser.",econ:"NIS2 + GDPR bødeeksponering: samlet realistisk 1–3 mio. kr. Dertil personlig bøde til Mette Sørensen som direktør.",econ_impact:1500000,legal:["NIS2 § 13 – 24-timers frist overskredet","GDPR art. 33 – 72-timers frist til Datatilsynet overskredet","Personlig bøde til Mette Sørensen","Ansvar gælder selvom hændelsen skete hos CloudHost"]},
      {text:"Vi igangsætter straks forberedelse af tidlig varsling til NIS2-myndigheden og CSIRT via virk.dk samt til Datatilsynet om det mulige GDPR-brud. Aktivoversigten bruges som dokumentationsgrundlag for scopet i begge underretninger.",shortText:"Tidlig NIS2-varsling og GDPR-underretning igangsat via virk.dk",d:0,c:-2,o:0,l:-1,quality:"bad",consequence:"NIS2-underretningspligten og GDPR-underretningspligten er to juridisk separate forpligtelser med forskellige modtagere og frister. GDPR-anmeldelsen til Datatilsynet fritager ikke DataBridge for NIS2-rapporteringen til sektoransvarlig myndighed og CSIRT.",econ:"Manglende NIS2-underretning er en selvstændig overtrædelse uanset GDPR-anmeldelsen. Bødeeksponering uændret for NIS2-delen.",econ_impact:800000,legal:["NIS2 § 13 – 24-timers frist overskredet","NIS2 og GDPR er separate forpligtelser med separate modtagere"]}
    ]
  },
  {
    time:"Mandag kl. 10.30",title:"Runde 7",module:"Fase 5 – Kommunikation og omdømme",
    lawRef:"§ 15 – Underretning af modtagere",ismsRef:null,
    situation:`<strong>Pressen og kunderne banker på.</strong> En journalist ringer og er ved at publicere en artikel om angrebet. Tre kunder ringer til Line Kristensen (Head of Operations) og spørger direkte: <em>"Er vores data i sikkerhed?"</em><br><br>DataBridges kommunikationsansvarlige er på ferie. Der er ingen krisekommunikationsplan. Mette Sørensen (CEO), Jakob Dahl (CFO) og Line Kristensen (Head of Operations) er alle ved at formulere hvert deres svar til de samme kunder.<br><br>Anders gør opmærksom på at § 15 i visse tilfælde giver en pligt til at underrette modtagere i let forståeligt sprog, hvis hændelsen påvirker leveringen negativt.`,
    insight:"§ 15 kræver klar og koordineret underretning af modtagere. Ukontrolleret kommunikation fra flere ledere udgør en risiko for overtrædelse og forværrer omdømmetabet.",
    choices:[
      {text:"Mette udpeges som eneste eksterne talsperson for DataBridge. Der udarbejdes én koordineret statusmelding til kunderne og én neutral kommentar til journalisten – begge gennemgås og godkendes af Anders inden afsendelse.",shortText:"Mette udpeget som eneste talsperson – koordineret budskab",d:0,c:2,o:2,l:2,quality:"good",consequence:"DataBridges troværdighed beskyttes ved én konsistent kommunikation. § 15 opfyldes med en klar og koordineret underretning. Journalisten modtager en faktuel kommentar. Underretningen dokumenteres i hændelsesloggen.",econ:"Koordineret krisekommunikation reducerer estimeret kundefrafald med 20–40% sammenlignet med ukontrolleret kommunikation.",econ_impact:0,legal:[]},
      {text:"Vi lader Mette, Jakob og Line besvare henvendelserne fra deres egne kunderelationer, da de kender kunderne bedst og ved, hvad der konkret skal til for at bevare tilliden og undgå eskalering i de respektive relationer.",shortText:"Tre ledere besvarer kunder selvstændigt – ukontrolleret",d:0,c:-2,o:-2,l:-2,quality:"bad",consequence:"Tre ledere kommunikerer tre versioner af samme hændelse. Journalisten samler modsatrettede citater og skriver en mere alarmerende artikel. Ukonsistent kommunikation til kunder kan udgøre en overtrædelse af § 15.",econ:"Ukonsistent krisekommunikation: estimeret risiko for kundefrafald på 15–25% af nøglekunder inden for de næste 12 måneder.",econ_impact:180000,legal:["NIS2 § 15 – risiko for mangelfuld og ukonsistent underretning af modtagere"]},
      {text:"Vi svarer journalisten med 'ingen kommentar' og beder de kunder der ringer, vente på en officiel skriftlig udmelding. Det er bedre at udsætte kommunikationen end at risikere at sige noget forkert eller ufuldstændigt under pres.",shortText:"Ingen kommentar til presse – kunder bedt om at vente",d:0,c:0,o:-2,l:-1,quality:"neutral",consequence:"Journalisten skriver artiklen alligevel – nu uden DataBridges perspektiv og med en mere spekulativ vinkel. Kunderne oplever at virksomheden gemmer sig. Ånd og krav i § 15 om klar kommunikation er ikke opfyldt.",econ:"Ingen umiddelbar bøderisiko, men den omdømmeskade der opstår ved tavshed er svær og dyr at reparere efterfølgende.",econ_impact:80000,legal:[]}
    ]
  },
  {
    time:"Mandag kl. 11.00",title:"Runde 8",module:"Fase 6 – Ledelsesansvar og governance",
    lawRef:"§ 7 – Ledelsesforankring · Art. 20 NIS2-direktivet",ismsRef:"Governance · Ledelsesgodkendelse",
    situation:`<strong>Bestyrelsen vil have svar.</strong> Hanne Vestergaard (bestyrelsesformand) ringer direkte til Mette og stiller tre præcise spørgsmål: <em>"Hvem har det juridiske ansvar? Hvad er DataBridges realistiske bødeeksponering? Og hvad har I besluttet siden 08.12?"</em><br><br>§ 7 er tydelig: ledelsesorganet skal godkende foranstaltninger, tage stilling til risikovillighed og overvåge implementeringen. Art. 20 i direktivet: ledelsesorganer kan gøres personligt ansvarlige.<br><br>Beslutningsloggen og aktivoversigten fra de første runder er nu afgørende dokumentation for, at Mette og bestyrelsen har handlet i overensstemmelse med § 7.`,
    insight:"Bestyrelsesinformation er en lovpligtig forpligtelse. Direktøren kan personligt gøres ansvarlig efter dansk rets culpaansvar. Ledelsesorganet er NIS2's primære ansvarssubjekt.",

// ─── HJÆLPEFUNKTIONER ────────────────────────────────────────────────────
function shuffle(arr) {
  const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;
}
function shuffleRounds(rounds){return rounds.map(r=>({...r,choices:shuffle(r.choices)}))}
function dkk(n){return n?new Intl.NumberFormat('da-DK',{style:'currency',currency:'DKK',maximumFractionDigits:0}).format(n):'–'}
function calcScore(st){return Math.round((st.drift*.2+st.compliance*.3+st.omdoemme*.2+st.ledelse*.3)*10)/10}
function getProfile(st){const s=calcScore(st);return s>=22?'robust':s>=11?'driftsfokus':s>=0?'reaktiv':'sarbar'}
function sg(v){return v>0?'+':''}
function vc(v){return v>0?'pos':v<0?'neg':''}

function getRisks(st,rounds){
  const r=[];
  if(!st.markers.risikovurdering)r.push('Ingen formel risikovurdering eller fortegnelse over informationsaktiver (ISMS-scope mangler)');
  if(!st.markers.beredskab)r.push('Ingen aktiveret beredskabsplan eller krisestab med klare roller');
  if(!st.markers.leverandor)r.push("Utilstrækkelig leverandørstyring – ingen krav til TechOps' underleverandør CloudHost");
  if(!st.markers.dokumentation)r.push('Manglende dokumentation og rettidig rapportering til myndighederne');
  if(st.ledelse<0)r.push('Svag ledelsesforankring – § 7-forpligtelserne om godkendelse og tilsyn ikke opfyldt');
  if(st.compliance<0)r.push('Uopfyldt rapporteringspligt – risiko for bøder og personligt ansvar for Mette');
  const bad=st.chosen.filter(c=>rounds[c.round].choices[c.idx].quality==='bad').length;
  if(bad>=4)r.push('Gentagen passiv afventning – risiko for fratagelse af Mettes ledelsesfunktion (§ 23)');
  return r.slice(0,4);
}
function getGoods(st,rounds){
  const g=[];
  if(st.markers.risikovurdering)g.push('Aktivoversigt udarbejdet tidligt – gav prioriteringsgrundlag og myndighedsdokumentation i runde 5, 6 og 10');
  if(st.markers.beredskab)g.push('Krisestab med klare roller aktiveret – Mette, Jakob og Line koordinerede effektivt');
  if(st.markers.leverandor)g.push('Aktiv leverandørstyring med krav til TechOps og vurdering af CloudHosts sikkerhedsniveau');
  if(st.markers.dokumentation)g.push('Rettidig rapportering til NIS2-myndighed og Datatilsynet inden fristerne');
  if(st.ledelse>=4)g.push('Stærk ledelsesforankring: bestyrelsen informeret og § 7-forpligtelserne opfyldt');
  if(st.omdoemme>=2)g.push('Koordineret og professionel kommunikation – ét budskab, én talsperson');
  if(g.length===0)g.push("DataBridge gennemførte simulationen og fik indblik i NIS2's krav til ISMS og ledelsesansvar");
  return g.slice(0,4);
}

// ─── KULISSE SVG ─────────────────────────────────────────────────────────
function kulisseSVG(size=140,color='#80B4BF',op=0.18){
  const cx=size/2,r=size/2-4,n=16;
  const dots=Array.from({length:n},(_,i)=>{
    const a=(i/n)*2*Math.PI-Math.PI/2;
    return `<circle cx="${(cx+r*Math.cos(a)).toFixed(1)}" cy="${(cx+r*Math.sin(a)).toFixed(1)}" r="${(size*.032).toFixed(1)}" fill="${color}"/>`;
  }).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="opacity:${op}" aria-hidden="true">${dots}</svg>`;
}

// ─── HANDLINGER ──────────────────────────────────────────────────────────
function startSim(){ST.screen='round';render()}
// ─── TIMER ───────────────────────────────────────────────────────────────
const TIMER_SECS = 120; // 2 minutter
const AUTO_ADVANCE_SECS = 180; // 3 minutter – auto-fremrykning
let _timerInterval = null;
let _timerStart = null;

function startRoundTimer(){
  clearInterval(_timerInterval);
  _timerStart = Date.now();
  _timerInterval = setInterval(tickTimer, 250);
}

function stopRoundTimer(){
  clearInterval(_timerInterval);
  _timerInterval = null;
}

function tickTimer(){
  if(ST.screen !== 'round') { stopRoundTimer(); return; }
  if(ST.chosen.find(c=>c.round===ST.round)) { stopRoundTimer(); return; }

  const elapsed = (Date.now() - _timerStart) / 1000;
  const remaining = TIMER_SECS - elapsed;
  const overdue = elapsed - TIMER_SECS;

  // Auto-fremrykning ved 3 minutter – tildel dårligste svar
  if(elapsed >= AUTO_ADVANCE_SECS){
    stopRoundTimer();
    autoAdvance();
    return;
  }

  updateTimerDisplay(remaining, elapsed);
}

function updateTimerDisplay(remaining, elapsed){
  const svg = document.getElementById('timer-svg');
  const center = document.getElementById('timer-center');
  const label = document.getElementById('timer-label');
  if(!svg || !center) return;

  const R = 28;
  const circ = 2 * Math.PI * R;
  const fill = svg.querySelector('.timer-ring-fill');

  if(remaining >= 0){
    // Nedtælling 2:00 → 0:00
    const pct = remaining / TIMER_SECS;
    const offset = circ * (1 - pct);
    fill.style.strokeDasharray = circ;
    fill.style.strokeDashoffset = offset;
    fill.style.stroke = remaining > 30 ? '#3A646D' : '#A32D2D';
    const m = Math.floor(remaining/60);
    const s = Math.floor(remaining%60);
    center.textContent = `${m}:${String(s).padStart(2,'0')}`;
    center.style.fill = remaining > 30 ? '#2C3E44' : '#A32D2D';
    if(label) label.textContent = 'tilbage';
  } else {
    // Over tid – tæller op i minus, rød
    const overSecs = Math.floor(-remaining);
    const m = Math.floor(overSecs/60);
    const s = overSecs%60;
    fill.style.strokeDasharray = circ;
    fill.style.strokeDashoffset = 0;
    fill.style.stroke = '#A32D2D';
    center.textContent = `+${m>0?m+'m':s+'s'}`;
    center.style.fill = '#A32D2D';
    if(label) label.textContent = 'overskredet';
    // Ryst kortet let
    const card = document.querySelector('.card');
    if(card && Math.floor(-remaining) % 10 === 0){
      card.style.borderColor = '#A32D2D';
      setTimeout(()=>{if(card)card.style.borderColor='';}, 300);
    }
  }
}

function autoAdvance(){
  // Find det dårligste svar (quality=bad) – eller neutralt – eller første
  const r = ROUNDS[ST.round];
  let worstIdx = r.choices.findIndex(c=>c.quality==='bad');
  if(worstIdx === -1) worstIdx = r.choices.findIndex(c=>c.quality==='neutral');
  if(worstIdx === -1) worstIdx = 0;

  // Marker med auto-flag
  window._autoAdvanced = true;
  choose(worstIdx);

  // Gå direkte til summary efter kort pause
  setTimeout(()=>{
    window._autoAdvanced = false;
    nextRound();
  }, 800);
}

function choose(idx){
  if(ST.chosen.find(c=>c.round===ST.round))return;
  stopRoundTimer();
  const c=ROUNDS[ST.round].choices[idx];
  ST.drift+=c.d;ST.compliance+=c.c;ST.omdoemme+=c.o;ST.ledelse+=c.l;
  ST.econTotal+=c.econ_impact||0;
  if(c.legal)ST.legalFlags.push(...c.legal);
  if(c.markers)c.markers.forEach(m=>ST.markers[m]=true);
  ST.chosen.push({round:ST.round,idx});
  if(window.fbSend) window.fbSend(ST.round, c.quality, c.shortText||c.text.substring(0,60));
  render();
}
function nextRound(){
  if(ST.round+1>=TOTAL){ST.screen='report';render();return}
  ST.screen='summary';render();
}
function continueAfterSummary(){
  ST.round++;
  ST.screen='round';
  render();
}
function restart(){
  ROUNDS=shuffleRounds(RAW_ROUNDS);
  ST={screen:'start',round:0,chosen:[],drift:0,compliance:0,omdoemme:0,ledelse:0,econTotal:0,
    markers:{beredskab:false,leverandor:false,dokumentation:false,risikovurdering:false},legalFlags:[]};
  render();
}

    doc.setTextColor(...C.gray);
    doc.text('DataBridge Solutions A/S · NIS2 Ledelsessimulation',M,H-4);
    doc.text(label,W-M,H-4,{align:'right'});
  }
  function fr(x,y,w,h,col,r=0){
    doc.setFillColor(...col);
    r>0?doc.roundedRect(x,y,w,h,r,r,'F'):doc.rect(x,y,w,h,'F');
  }
  function sr(x,y,w,h,col,lw=0.3){
    doc.setDrawColor(...col);doc.setLineWidth(lw);doc.rect(x,y,w,h,'S');
  }
  function sf(weight,size){doc.setFont('helvetica',weight);doc.setFontSize(size);}
  function sc(col){doc.setTextColor(...col);}
  function checkY(y,needed,footerLabel){
    if(y+needed>H-18){
      footer(footerLabel);
      newPage();
      return 24;
    }
    return y;
  }
  function secLabel(text,y){
    sf('bold',7);sc(C.gray);doc.text(text.toUpperCase(),M,y);
    doc.setDrawColor(...C.teal);doc.setLineWidth(.5);doc.line(M,y+1,W-M,y+1);
    return y+6;
  }
  function profileColors(k){
    if(k==='robust')return{fill:C.pale,border:C.teal,text:[44,79,87]};
    if(k==='driftsfokus')return{fill:C.butter,border:[200,184,106],text:[90,74,16]};
    if(k==='reaktiv')return{fill:[250,236,231],border:[240,153,123],text:[74,27,12]};
    return{fill:[252,235,235],border:[240,149,149],text:[80,19,19]};
  }
  function profileLabel(k){
    if(k==='robust')return'Robust ledelse';
    if(k==='driftsfokus')return'Driftsfokuseret ledelse';
    if(k==='reaktiv')return'Reaktiv ledelse';
    return'Saarbar ledelse';
  }
  function profileDesc(k){
    if(k==='robust')return'DataBridge tog tidligt ansvar og arbejdede struktureret. Aktivoversigten, krisestaben og den loebende dokumentation viste, at ledelsen levede op til NIS2 kravene.';
    if(k==='driftsfokus')return'DataBridge fik fokus paa at holde driften i gang, men oversaa vasentlige NIS2-krav til ISMS, dokumentation og rapportering.';
    if(k==='reaktiv')return'DataBridge reagerede for sent og overlod for meget til TechOps. Adskillige frister og paragraf 7-forpligtelser blev ikke overholdt.';
    return'DataBridge manglede samlet retning, ISMS og ledelsesstyring. En reel haendelse ville sandsynligvis resultere i boeder og fratagelse af ledelsesfunktion.';
  }

  // ════════════════════════════════════════════════════════
  // SIDE 1 – Score, profil, risici, styrker
  // ════════════════════════════════════════════════════════
  newPage();
  let y=24;

  // Titel
  sf('bold',18);sc(C.jade);doc.text('NIS2 Simulationsrapport',M,y);y+=7;
  sf('normal',9);sc(C.muted);doc.text('DataBridge Solutions A/S  \u00b7  Genereret '+today,M,y);y+=10;

  // Score-boks
  fr(M,y,CW,22,C.pale,3);
  doc.setDrawColor(...C.teal);doc.setLineWidth(.8);doc.line(M,y,M+CW,y);
  sf('bold',26);sc(C.jade);doc.text(score>0?'+'+score:String(score),W/2,y+14,{align:'center'});
  sf('normal',7);sc(C.gray);doc.text('SAMLET NIS2 LEDELSESSCORE',W/2,y+20,{align:'center'});
  y+=28;

  // Indikatorer
  const iLabels=['Drift','Compliance','Omdoemme','Ledelse','Oek. risiko'];
  const iVals=[ST.drift,ST.compliance,ST.omdoemme,ST.ledelse,null];
  const iw=(CW-4*3)/5;
  iLabels.forEach((lbl,i)=>{
    const ix=M+i*(iw+3),isE=i===4;
    const bg=isE?C.butter:C.qgray,br=isE?[200,184,106]:C.shy;
    fr(ix,y,iw,14,bg,2);sr(ix,y,iw,14,br);
    sf('bold',5.5);sc(isE?[122,106,32]:C.gray);doc.text(lbl.toUpperCase(),ix+iw/2,y+4.5,{align:'center'});
    if(isE){
      sf('bold',7);sc([122,106,32]);
      doc.text(ST.econTotal?dkk(Math.abs(ST.econTotal)):'\u2013',ix+iw/2,y+11,{align:'center'});
    } else {
      const v=iVals[i],col=v>0?C.jade:v<0?C.red:C.dark;
      sf('bold',11);sc(col);doc.text((v>0?'+':'')+v,ix+iw/2,y+11,{align:'center'});
    }
  });
  y+=20;

  // Advarsel
  if(badCount>=4){
    fr(M,y,CW,11,[252,235,235],2);sr(M,y,CW,11,[240,149,149]);
    sf('bold',7);sc([80,19,19]);
    doc.text('Advarsel: '+badCount+' kritiske fejlvalg. Reel eksponering for boeder og potentiel suspension (ss. 23).',M+3,y+7.5);
    y+=16;
  }

  // Profil
  y=secLabel('Ledelsesvurdering',y);
  const pc=profileColors(pk);
  fr(M,y,CW,30,pc.fill,3);
  doc.setDrawColor(...pc.border);doc.setLineWidth(1.2);doc.line(M,y,M,y+30);
  doc.setLineWidth(.3);sr(M,y,CW,30,pc.border);
  sf('bold',11);sc(pc.text);doc.text(profileLabel(pk),M+4,y+8);
  sf('normal',8.5);
  const dl=doc.splitTextToSize(profileDesc(pk),CW-8);
  doc.text(dl,M+4,y+15);
  y+=36;

  // Risici
  if(risks.length){
    y=secLabel('Identificerede risici og mangler',y);
    risks.forEach(r=>{
      y=checkY(y,11,'Side 1');
      fr(M,y,CW,9,C.qgray,2);sr(M,y,CW,9,C.shy);
      doc.setFillColor(...C.red);doc.circle(M+4,y+4.5,1.2,'F');
      sf('normal',8);sc(C.dark);
      const ls=doc.splitTextToSize(r,CW-10);
      doc.text(ls[0],M+7,y+5.2);
      y+=11;
    });
    y+=2;
  }

  // Styrker
  if(goods.length){
    y=secLabel('Hvad DataBridge gjorde rigtigt',y);
    goods.forEach(g=>{
      y=checkY(y,11,'Side 1');
      fr(M,y,CW,9,C.pale,2);sr(M,y,CW,9,C.teal);
      doc.setFillColor(...C.jade);doc.circle(M+4,y+4.5,1.2,'F');
      sf('normal',8);sc(C.dark);
      const ls=doc.splitTextToSize(g,CW-10);
      doc.text(ls[0],M+7,y+5.2);
      y+=11;
    });
  }

  footer('Side 1 af '+( pageNum+2));

  // ════════════════════════════════════════════════════════
  // SIDE 2 – Beslutningsoversigt per fase
  // ════════════════════════════════════════════════════════
  newPage();
  y=24;
  sf('bold',14);sc(C.jade);doc.text('Beslutningsoversigt per fase',M,y);y+=5;
  sf('normal',8.5);sc(C.muted);doc.text('Dine valg i simulationen – opdelt efter fagomraade',M,y);y+=9;

  FASER.forEach(fase=>{
    // Find runder for denne fase som deltager har gennemfort
    const faseChosen=ST.chosen.filter(c=>fase.runder.includes(c.round));
    if(faseChosen.length===0)return;

    y=checkY(y,22,'Side 2');

    // Fase-header
    fr(M,y,CW,14,C.jade,3);
    doc.setFillColor(...C.teal);doc.rect(M,y,CW,2,'F');
    sf('bold',9);sc(C.white);
    const faseNavn=fase.navn.replace(/[^\x00-\x7E]/g,c=>c);
    doc.text(faseNavn,M+4,y+9);
    sf('normal',6.5);doc.setTextColor(255,255,255);
    doc.text('Lovgrundlag: '+fase.ref,W-M-3,y+9,{align:'right'});
    y+=16;

    // Valg i denne fase
    faseChosen.forEach(cv=>{
      const rn=ROUNDS[cv.round],ch=rn.choices[cv.idx];
      const isG=ch.quality==='good',isB=ch.quality==='bad';
      const rowH=ch.econ_impact>0?22:16;
      y=checkY(y,rowH+2,'Side 2');

      const bg=isG?C.pale:isB?[252,235,235]:C.qgray;
      const br=isG?C.teal:isB?[240,149,149]:C.shy;
      const ac=isG?C.jade:isB?C.red:C.gray;
      fr(M,y,CW,rowH,bg,2);sr(M,y,CW,rowH,br,.3);
      doc.setFillColor(...ac);doc.rect(M,y,2.5,rowH,'F');

      // Runde-label
      sf('bold',6);sc(C.gray);
      doc.text(rn.title+' \u00b7 '+rn.time,M+5,y+4);

      // Valgt tekst
      sf('normal',7.5);sc(C.dark);
      const choiceLines=doc.splitTextToSize(ch.shortText||ch.text.substring(0,80),CW-30);
      doc.text(choiceLines[0],M+5,y+9.5);

      // Konsekvens (kort)
      if(rowH>16){
        sf('normal',6.5);sc(C.muted);
        const consLines=doc.splitTextToSize(ch.consequence,CW-30);
        doc.text(consLines[0],M+5,y+14.5);
      }

      // Kvalitetsmærke
      const qL=isG?'God':isB?'Kritisk':'Neutral';
      const qW=18;
      fr(M+CW-qW-1,y+2.5,qW,6,ac,2);
      sf('bold',5.5);sc(C.white);
      doc.text(qL,M+CW-qW/2-1,y+6.5,{align:'center'});

      // Økonomi
      if(ch.econ_impact>0){
        sf('bold',6.5);sc([90,74,16]);
        doc.text(dkk(ch.econ_impact),M+CW-qW-5,y+14.5,{align:'right'});
      }

      y+=rowH+3;
    });

    // Læringsnote for denne fase
    y=checkY(y,18,'Side 2');
    fr(M,y,CW,16,[230,244,247],2);
    doc.setDrawColor(...C.teal);doc.setLineWidth(.8);doc.line(M,y,M,y+16);
    sf('bold',6);sc([44,79,87]);doc.text('Laeringsmaalet for dette fagomraade',M+4,y+4.5);
    sf('normal',7);
    const lmLines=doc.splitTextToSize(fase.læringsmål,CW-10);
    doc.text(lmLines,M+4,y+9.5);
    sf('normal',6);sc(C.gray);
    doc.text('Laes mere: '+fase.links,M+4,y+14);
    y+=20;
  });

  footer('Side 2 af '+(pageNum+1));

  // ════════════════════════════════════════════════════════
  // SIDE 3 – Økonomi + CTA
  // ════════════════════════════════════════════════════════
  newPage();
  y=24;

  // Økonomi-tabel
  if(ST.econTotal>0){
    y=secLabel('Oekonomisk risikoeksponering per runde',y);
    fr(M,y,CW,8,C.butter,2);sr(M,y,CW,8,[200,184,106]);
    sf('bold',7);sc([90,74,16]);
    doc.text('Runde',M+3,y+5.2);doc.text('Tidspunkt',M+50,y+5.2);
    doc.text('Estimeret eksponering',W-M-3,y+5.2,{align:'right'});
    y+=9;
    ST.chosen.forEach(c=>{
      const ch=ROUNDS[c.round].choices[c.idx];
      if(!ch.econ_impact)return;
      const rn=ROUNDS[c.round];
      y=checkY(y,8,'Side 3');
      fr(M,y,CW,7,C.qgray,1);sr(M,y,CW,7,C.shy,.2);
      sf('normal',7);sc(C.dark);doc.text(rn.title,M+3,y+4.8);doc.text(rn.time,M+50,y+4.8);
      sf('bold',7);sc([90,74,16]);doc.text(dkk(ch.econ_impact),W-M-3,y+4.8,{align:'right'});
      y+=8;
    });
    fr(M,y,CW,9,C.butter,2);
    doc.setDrawColor(...[200,184,106]);doc.setLineWidth(.6);doc.rect(M,y,CW,9,'S');
    sf('bold',9);sc([90,74,16]);
    doc.text('Samlet estimeret eksponering',M+3,y+6);
    doc.text(dkk(ST.econTotal),W-M-3,y+6,{align:'right'});
    y+=16;
  }

  // Faglige ressourcer
  y=secLabel('Faglige ressourcer og videre laering',y);
  const ressourcer=[
    {navn:'Sikkerhedsstyrelsen – NIS2',url:'sik.dk/erhverv/nis2-direktivet',desc:'Officiel vejledning, tilsynsinfo og NIS2-lovtekst'},
    {navn:'SikkerDigital.dk',url:'sikkerdigital.dk/nis2',desc:'Praktisk ISMS-vejledning og tjeklister til virksomheder'},
    {navn:'Datatilsynet',url:'datatilsynet.dk',desc:'GDPR-vejledning og anmeldelse af brud'},
    {navn:'Retsinformation.dk',url:'retsinformation.dk',desc:'Den danske NIS2-lovtekst og bekeendtgoerelser'},
    {navn:'EAAA NIS2 Compliance-forloeb',url:'eaaa.dk/nis',desc:'Forloeb der giver ledelser konkrete NIS2-kompetencer'},
  ];
  ressourcer.forEach(r=>{
    y=checkY(y,10,'Side 3');
    fr(M,y,CW,8,C.qgray,2);sr(M,y,CW,8,C.shy,.2);
    doc.setFillColor(...C.teal);doc.circle(M+4,y+4,1.2,'F');
    sf('bold',7.5);sc(C.jade);doc.text(r.navn,M+7,y+4.5);
    sf('normal',6.5);sc(C.gray);doc.text(r.url,M+7,y+7.5);
    sf('normal',6.5);sc(C.muted);doc.text(r.desc,W-M-3,y+6,{align:'right'});
    y+=10;
  });
  y+=4;

  // CTA
  y=checkY(y,30,'Side 3');
  fr(M,y,CW,28,C.jade,4);fr(M,y,CW,2,C.teal);
  sf('bold',11);sc(C.white);doc.text('NIS2 Compliance-forloeb – eaaa.dk/nis',M+6,y+9);
  sf('normal',8);doc.setTextColor(255,255,255);
  const ctaL=doc.splitTextToSize('Forlobet giver ledelser et faelles sprog, konkrete ISMS-vaerktojer og forstaelse for det personlige ansvar, NIS2 medfoerer.',CW-12);
  doc.text(ctaL,M+6,y+16);

  // Opdater alle footers med korrekt sidetal
  const totalPages=pageNum;
  // Ret footer side 1 og 2 – de er allerede skrevet med korrekt tal
  footer('Side '+pageNum+' af '+totalPages);

  // Aaben i ny fane
  try {
    const url=doc.output('bloburl');
    window.open(url,'_blank');
  } catch(e){
    doc.save('nis2-simulationsrapport.pdf');
  }
}


// ─── START ───────────────────────────────────────────────────────────────
render();
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCf61thmI8AyQUkRldS2FmmZZFpa6yAXDc",
  authDomain: "nis2-simulation.firebaseapp.com",
  databaseURL: "https://nis2-simulation-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "nis2-simulation",
  storageBucket: "nis2-simulation.firebasestorage.app",
  messagingSenderId: "570342903290",
  appId: "1:570342903290:web:cbeb11ba80c8e941ece843"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Anonym session-ID
const SID = sessionStorage.getItem('nis2_sid') || 'dx' + Math.random().toString(36).substr(2,5);
sessionStorage.setItem('nis2_sid', SID);

// Vis session-ID i topbar
setTimeout(() => {
  const el = document.getElementById('sid-indicator');
  if(el) el.textContent = '● ' + SID;
}, 500);

// Send svar til Firebase - kaldes fra choose()
window.fbSend = function(roundIdx, quality, shortText) {
  set(ref(db, 'answers/' + roundIdx + '/' + SID), {
    quality, shortText, ts: Date.now()
  }).catch(e => console.warn('Firebase send fejl:', e));
};

// Lyt på session/state – vis ventesskærm indtil facilitator starter
onValue(ref(db, 'session/state'), snap => {
  const state = snap.val();
  const waiting = document.getElementById('waiting-screen');
  const app = document.getElementById('app');
  if(!waiting || !app) return;
  if(state === 'active') {
    // Session er startet af facilitator
    waiting.style.display = 'none';
    app.style.display = 'block';
    app.className = 'outer';
    // Render kun hvis simulation ikke allerede er i gang
    if(typeof render === 'function' && (!window.ST || window.ST.screen === 'start')) {
      render();
    }
  } else {
    // Ingen aktiv session – vis ventesskærm
    waiting.style.display = 'flex';
    app.style.display = 'none';
  }
});

// Lyt på reset-signal fra facilitator
onValue(ref(db, 'session/resetSignal'), snap => {
  const v = snap.val();
  if(v && window._lastReset && v > window._lastReset) {
    window._lastReset = v;
    if(typeof restart === 'function') restart();
  }
  if(v && !window._lastReset) window._lastReset = v;
});
</script>
